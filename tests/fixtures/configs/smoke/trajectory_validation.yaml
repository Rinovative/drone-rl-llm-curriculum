name: trajectory_validation_smoke
seed: 0
validation_limits:
  arena_xy_limit: 2.0
  min_height: 0.2
  max_height: 2.0
  max_speed_m_s: 2.0
  max_acceleration_m_s2: 5.0
  min_duration_sec: 1.0
  max_step_distance_m: 0.5
tasks:
  - task_type: trajectory
    shape: hover
    duration_sec: 2.0
    sample_rate_hz: 5.0
    position: [0.0, 0.0, 1.0]
  - task_type: trajectory
    shape: circle
    duration_sec: 8.0
    sample_rate_hz: 10.0
    radius: 0.5
    height: 1.0
    center: [0.0, 0.0]
    clockwise: false
  - task_type: trajectory
    shape: line
    duration_sec: 3.0
    sample_rate_hz: 10.0
    start: [0.0, 0.0, 1.0]
    end: [1.0, 0.0, 1.0]
  - task_type: trajectory
    shape: vertical
    duration_sec: 3.0
    sample_rate_hz: 10.0
    xy: [0.25, -0.25]
    start_height: 0.8
    end_height: 1.4
  - task_type: trajectory
    shape: polyline
    duration_sec: 6.0
    sample_rate_hz: 10.0
    points:
      - [0.0, 0.0, 1.0]
      - [0.5, 0.0, 1.1]
      - [0.5, 0.5, 1.0]
