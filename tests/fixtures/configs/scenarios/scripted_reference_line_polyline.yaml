scenario_name: scripted_reference_line_polyline
task_config_path: tests/fixtures/configs/smoke/trajectory_validation.yaml

controller: scripted_reference

max_steps: 320
seed: 0
start_hold_sec: 0.0
final_hold_sec: 2.0

camera:
  mode: follow_external
  distance: 1.15
  yaw: 40
  pitch: -23

phases:
  - name: line_forward
    type: line
    start_mode: initial
    duration_sec: 10.0
    hold_after_sec: 1.0
    delta_position: [0.6, 0.0, 0.0]

  - name: polyline_turns
    type: polyline
    start_mode: previous_end
    duration_sec: 16.0
    waypoints:
      - [0.0, 0.0, 0.0]
      - [0.0, 0.4, 0.0]
      - [0.4, 0.4, 0.0]
