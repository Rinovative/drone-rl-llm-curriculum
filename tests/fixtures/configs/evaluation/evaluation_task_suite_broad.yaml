evaluation_name: broad_suite
seed: 0
eval_steps: 360

render:
  enabled: true
  fps: 20
  max_steps: null

plots:
  enabled: true

traces:
  enabled: true

tasks:
  - task_name: hover_center
    task_shape: hover_stabilization
    task:
      task_type: trajectory
      shape: hover_stabilization
      duration_sec: 3.0
      sample_rate_hz: 10.0
      position: [0.0, 0.0, 1.0]
  - task_name: hover_low
    task_shape: hover_stabilization
    task:
      task_type: trajectory
      shape: hover_stabilization
      duration_sec: 3.0
      sample_rate_hz: 10.0
      position: [0.0, 0.0, 0.8]
  - task_name: hover_high
    task_shape: hover_stabilization
    task:
      task_type: trajectory
      shape: hover_stabilization
      duration_sec: 3.0
      sample_rate_hz: 10.0
      position: [0.0, 0.0, 1.2]
  - task_name: hover_offset_x
    task_shape: hover_stabilization
    task:
      task_type: trajectory
      shape: hover_stabilization
      duration_sec: 3.0
      sample_rate_hz: 10.0
      position: [0.2, 0.0, 1.0]
  - task_name: hover_offset_y
    task_shape: hover_stabilization
    task:
      task_type: trajectory
      shape: hover_stabilization
      duration_sec: 3.0
      sample_rate_hz: 10.0
      position: [0.0, 0.2, 1.0]
  - task_name: hover_offset_xy
    task_shape: hover_stabilization
    task:
      task_type: trajectory
      shape: hover_stabilization
      duration_sec: 3.0
      sample_rate_hz: 10.0
      position: [0.2, -0.2, 1.0]
  - task_name: takeoff_stabilization_vertical
    task_shape: vertical
    task:
      task_type: trajectory
      shape: vertical
      duration_sec: 4.0
      sample_rate_hz: 10.0
      start_hold_enabled: true
      start_hold_sec: 1.0
      exclude_start_hold_from_tracking_metrics: true
      xy: [0.0, 0.0]
      start_height: 0.35
      end_height: 1.0
  - task_name: line_slow
    task_shape: line
    task:
      task_type: trajectory
      shape: line
      duration_sec: 5.0
      sample_rate_hz: 10.0
      start_hold_enabled: true
      start_hold_sec: 1.0
      exclude_start_hold_from_tracking_metrics: true
      start: [0.0, 0.0, 1.0]
      end: [0.5, 0.0, 1.0]
  - task_name: line_medium
    task_shape: line
    task:
      task_type: trajectory
      shape: line
      duration_sec: 5.0
      sample_rate_hz: 10.0
      start_hold_enabled: true
      start_hold_sec: 1.0
      exclude_start_hold_from_tracking_metrics: true
      start: [0.0, 0.0, 1.0]
      end: [0.8, 0.2, 1.0]
  - task_name: start_hold_then_line_slow
    task_shape: start_hold_then_short_line
    task:
      task_type: trajectory
      shape: start_hold_then_short_line
      hold_duration_sec: 1.25
      move_duration_sec: 4.5
      sample_rate_hz: 10.0
      start_hold_enabled: true
      start_hold_sec: 1.25
      exclude_start_hold_from_tracking_metrics: true
      start: [0.0, 0.0, 1.0]
      end: [0.55, 0.0, 1.0]
  - task_name: polyline_l_shape
    task_shape: polyline
    task:
      task_type: trajectory
      shape: polyline
      duration_sec: 8.0
      sample_rate_hz: 10.0
      start_hold_enabled: true
      start_hold_sec: 1.0
      exclude_start_hold_from_tracking_metrics: true
      points:
        - [0.0, 0.0, 1.0]
        - [0.45, 0.0, 1.0]
        - [0.45, 0.35, 1.0]
  - task_name: square_slow
    task_shape: polyline
    task:
      task_type: trajectory
      shape: polyline
      duration_sec: 12.0
      sample_rate_hz: 10.0
      start_hold_enabled: true
      start_hold_sec: 1.0
      exclude_start_hold_from_tracking_metrics: true
      points:
        - [-0.2, -0.2, 1.0]
        - [0.2, -0.2, 1.0]
        - [0.2, 0.2, 1.0]
        - [-0.2, 0.2, 1.0]
        - [-0.2, -0.2, 1.0]
  - task_name: circle_slow
    task_shape: circle
    task:
      task_type: trajectory
      shape: circle
      duration_sec: 10.0
      sample_rate_hz: 10.0
      start_hold_enabled: true
      start_hold_sec: 1.0
      exclude_start_hold_from_tracking_metrics: true
      radius: 0.3
      height: 1.0
      center: [0.0, 0.0]
      clockwise: false
  - task_name: ellipse_slow
    task_shape: ellipse
    task:
      task_type: trajectory
      shape: ellipse
      duration_sec: 12.0
      sample_rate_hz: 10.0
      start_hold_enabled: true
      start_hold_sec: 1.0
      exclude_start_hold_from_tracking_metrics: true
      radius_x: 0.35
      radius_y: 0.20
      height: 1.0
      center: [0.0, 0.0]
      clockwise: false
  - task_name: figure_eight_slow
    task_shape: figure_eight
    task:
      task_type: trajectory
      shape: figure_eight
      duration_sec: 14.0
      sample_rate_hz: 10.0
      start_hold_enabled: true
      start_hold_sec: 1.0
      exclude_start_hold_from_tracking_metrics: true
      radius_x: 0.30
      radius_y: 0.18
      height: 1.0
      center: [0.0, 0.0]
      clockwise: false
