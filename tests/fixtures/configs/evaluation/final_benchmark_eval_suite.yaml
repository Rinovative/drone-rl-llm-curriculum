evaluation_name: final_benchmark
seed: 0
eval_steps: 360

render:
  enabled: true
  fps: 20
  max_steps: null

plots:
  enabled: true

traces:
  enabled: true

tasks:
  - task_name: line_basic
    task_shape: line
    task:
      task_type: trajectory
      shape: line
      duration_sec: 3.0
      sample_rate_hz: 10.0
      start_hold_enabled: true
      start_hold_sec: 1.0
      exclude_start_hold_from_tracking_metrics: true
      start: [0.0, 0.0, 1.0]
      end: [1.0, 0.0, 1.0]
  - task_name: line_long_final
    task_shape: line
    task:
      task_type: trajectory
      shape: line
      duration_sec: 5.0
      sample_rate_hz: 10.0
      start_hold_enabled: true
      start_hold_sec: 1.0
      exclude_start_hold_from_tracking_metrics: true
      start: [0.0, 0.0, 1.0]
      end: [1.5, 0.0, 1.0]
  - task_name: line_diagonal
    task_shape: line
    task:
      task_type: trajectory
      shape: line
      duration_sec: 4.0
      sample_rate_hz: 10.0
      start_hold_enabled: true
      start_hold_sec: 1.0
      exclude_start_hold_from_tracking_metrics: true
      start: [0.0, 0.0, 1.0]
      end: [0.8, 0.6, 1.0]
  - task_name: line_reverse
    task_shape: line
    task:
      task_type: trajectory
      shape: line
      duration_sec: 4.0
      sample_rate_hz: 10.0
      start_hold_enabled: true
      start_hold_sec: 1.0
      exclude_start_hold_from_tracking_metrics: true
      start: [0.0, 0.0, 1.0]
      end: [-1.0, 0.0, 1.0]
