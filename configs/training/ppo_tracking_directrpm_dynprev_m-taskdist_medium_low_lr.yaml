task_config_path: configs/training/ppo_tracking_representative_tasks.yaml
task_index: 0
task_distribution_config_path: configs/tasks/task_distribution_tracking_medium.yaml
run_name: direct_ppo_directrpm_dynprev_m-taskdist_medium_low_lr_seed0
num_envs: 4
total_timesteps: 500000
eval_steps: 240
seed: 0
check_env: true
normalize_actions: true
action_interface: direct_rpm
include_dynamics_observation: true
include_previous_action: true
initial_state:
  mode: reference_start_random_offset
  xy_offset_range_m:
  - 0.1
  - 0.3
  z_offset_range_m:
  - -0.18
  - 0.08
  z_offset_bias: below
  below_probability: 0.7
termination_limits:
  mode: relaxed
diagnostic_limits:
  mode: default
ppo:
  policy: MlpPolicy
  device: cpu
  learning_rate: 0.0001
  gamma: 0.99
  gae_lambda: 0.95
  n_steps: 512
  batch_size: 128
  n_epochs: 5
  clip_range: 0.2
  ent_coef: 0.001
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.03
wandb_mode: auto
wandb_project: drone-rl-llm-curriculum
wandb_entity: null
wandb_group: direct_ppo/directrpm_dynprev_m-taskdist_medium_low_lr
wandb_name: direct_ppo_directrpm_dynprev_m-taskdist_medium_low_lr_seed0
wandb_tags:
- medium
- experimental
- direct_ppo
- task_distribution
- tracking_medium
- direct_rpm
- dynamics_observation
- previous_action
- low_lr
rpm_delta_scale: 0.05
