name: ppo_tracking_representative_tasks
task_config_role: representative_eval_only
representative_task_config_path: configs/training/ppo_tracking_representative_tasks.yaml
training_task_distribution_config_paths:
  basic_training_show: configs/tasks/task_distribution_basic_training_show.yaml
  tracking_medium: configs/tasks/task_distribution_tracking_medium.yaml
notes: Deterministic representative tasks for own_task evaluation, rendering, and
  task-shape selection only; varied training uses explicit task distribution configs.
seed: 0
validation_limits:
  arena_xy_limit: 2.0
  min_height: 0.2
  max_height: 2.0
  max_speed_m_s: 2.0
  max_acceleration_m_s2: 5.0
  min_duration_sec: 1.0
  max_step_distance_m: 0.5
tasks:
- task_name: line_basic
  task_type: trajectory
  shape: line
  duration_sec: 3.8
  sample_rate_hz: 10.0
  start_hold_enabled: true
  start_hold_sec: 1.8
  exclude_start_hold_from_tracking_metrics: true
  start:
  - 0.0
  - 0.0
  - 0.55
  end:
  - 1.2
  - 0.0
  - 0.55
  lower_start_height_enabled: true
  start_height_policy: lower_active_reference_0p45_0p75m
  height_variation_enabled: true
  start_hold_policy: evaluation_1p8s_after_lower_reference
  start_hold_reward_policy: full_tracking_reward_active_during_short_lower_start_hold
  tracking_reward_starts_after_start_hold: false
  base_z_m: 0.55
  sampled_start_height_m: 0.55
- task_name: line_long_final
  task_type: trajectory
  shape: line
  duration_sec: 6.2
  sample_rate_hz: 10.0
  start_hold_enabled: true
  start_hold_sec: 1.8
  exclude_start_hold_from_tracking_metrics: true
  start:
  - 0.0
  - 0.0
  - 0.55
  end:
  - 1.8
  - 0.0
  - 0.55
  lower_start_height_enabled: true
  start_height_policy: lower_active_reference_0p45_0p75m
  height_variation_enabled: true
  start_hold_policy: evaluation_1p8s_after_lower_reference
  start_hold_reward_policy: full_tracking_reward_active_during_short_lower_start_hold
  tracking_reward_starts_after_start_hold: false
  base_z_m: 0.55
  sampled_start_height_m: 0.55
- task_name: line_diagonal_validation
  task_type: trajectory
  shape: line
  duration_sec: 5.0
  sample_rate_hz: 10.0
  start_hold_enabled: true
  start_hold_sec: 1.8
  exclude_start_hold_from_tracking_metrics: true
  start:
  - 0.0
  - 0.0
  - 0.55
  end:
  - 1.0
  - 0.75
  - 0.55
  lower_start_height_enabled: true
  start_height_policy: lower_active_reference_0p45_0p75m
  height_variation_enabled: true
  start_hold_policy: evaluation_1p8s_after_lower_reference
  start_hold_reward_policy: full_tracking_reward_active_during_short_lower_start_hold
  tracking_reward_starts_after_start_hold: false
  base_z_m: 0.55
  sampled_start_height_m: 0.55
- task_name: basic_training_show
  task_type: trajectory
  shape: basic_training_show
  task_is_show: true
  show_name: basic_training_show
  duration_sec: 20.8
  sample_rate_hz: 10.0
  start_hold_enabled: true
  start_hold_sec: 1.8
  exclude_start_hold_from_tracking_metrics: true
  final_hold_enabled: true
  final_hold_sec: 1.0
  exclude_final_hold_from_tracking_metrics: true
  segment_count: 9
  meaningful_figure_count: 8
  segment_shapes:
  - start_hold
  - hover_stabilization
  - horizontal_line
  - diagonal_line
  - vertical
  - ellipse
  - l_shape
  - zigzag
  - final_hold
  show_is_continuous: true
  continuity_tolerance: 1.0e-06
  segments:
  - segment_name: hover_start
    segment_shape: hover_stabilization
    segment_start:
    - 0.0
    - 0.0
    - 0.45
    segment_end:
    - 0.0
    - 0.0
    - 0.45
    segment_duration_sec: 1.2
  - segment_name: horizontal_line
    segment_shape: horizontal_line
    segment_start:
    - 0.0
    - 0.0
    - 0.45
    segment_end:
    - 0.42
    - 0.0
    - 0.45
    segment_duration_sec: 2.1
  - segment_name: diagonal_line
    segment_shape: diagonal_line
    segment_start:
    - 0.42
    - 0.0
    - 0.45
    segment_end:
    - 0.7
    - 0.22
    - 0.47
    segment_duration_sec: 2.2
  - segment_name: vertical_lift
    segment_shape: vertical
    segment_start:
    - 0.7
    - 0.22
    - 0.47
    segment_end:
    - 0.7
    - 0.22
    - 0.69
    segment_duration_sec: 1.8
  - segment_name: ellipse_loop
    segment_shape: ellipse
    segment_start:
    - 0.7
    - 0.22
    - 0.69
    segment_end:
    - 0.7
    - 0.22
    - 0.69
    segment_duration_sec: 3.6
    radius_x_m: 0.16
    radius_y_m: 0.11
    phase_deg: 180.0
  - segment_name: polyline_l_shape
    segment_shape: l_shape
    segment_start:
    - 0.7
    - 0.22
    - 0.69
    segment_end:
    - 1.02
    - 0.52
    - 0.65
    segment_duration_sec: 2.8
    segment_points:
    - - 0.7
      - 0.22
      - 0.69
    - - 0.7
      - 0.52
      - 0.69
    - - 1.02
      - 0.52
      - 0.65
  - segment_name: zigzag_finish
    segment_shape: zigzag
    segment_start:
    - 1.02
    - 0.52
    - 0.65
    segment_end:
    - 1.55
    - 0.58
    - 0.61
    segment_duration_sec: 3.6
    segment_points:
    - - 1.02
      - 0.52
      - 0.65
    - - 1.2
      - 0.66
      - 0.65
    - - 1.38
      - 0.4
      - 0.61
    - - 1.55
      - 0.58
      - 0.61
  - segment_name: final_hold
    segment_shape: final_hold
    segment_start:
    - 1.55
    - 0.58
    - 0.61
    segment_end:
    - 1.55
    - 0.58
    - 0.61
    segment_duration_sec: 1.0
    segment_final_hold_sec: 1.0
  lower_start_height_enabled: true
  start_height_policy: lower_active_reference_0p45_0p75m
  height_variation_enabled: true
  start_hold_policy: evaluation_1p8s_after_lower_reference
  start_hold_reward_policy: full_tracking_reward_active_during_short_lower_start_hold
  tracking_reward_starts_after_start_hold: false
  base_z_m: 0.45
  sampled_start_height_m: 0.45
