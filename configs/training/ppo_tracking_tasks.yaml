name: ppo_tracking_production_tasks
seed: 0
validation_limits:
  arena_xy_limit: 2.0
  min_height: 0.2
  max_height: 2.0
  max_speed_m_s: 2.0
  max_acceleration_m_s2: 5.0
  min_duration_sec: 1.0
  max_step_distance_m: 0.5
tasks:
  - task_name: line_basic
    task_type: trajectory
    shape: line
    duration_sec: 3.0
    sample_rate_hz: 10.0
    start_hold_enabled: true
    start_hold_sec: 1.0
    exclude_start_hold_from_tracking_metrics: true
    start: [0.0, 0.0, 1.0]
    end: [1.0, 0.0, 1.0]
  - task_name: line_long_final
    task_type: trajectory
    shape: line
    duration_sec: 5.0
    sample_rate_hz: 10.0
    start_hold_enabled: true
    start_hold_sec: 1.0
    exclude_start_hold_from_tracking_metrics: true
    start: [0.0, 0.0, 1.0]
    end: [1.5, 0.0, 1.0]
  - task_name: line_diagonal_validation
    task_type: trajectory
    shape: line
    duration_sec: 4.0
    sample_rate_hz: 10.0
    start_hold_enabled: true
    start_hold_sec: 1.0
    exclude_start_hold_from_tracking_metrics: true
    start: [0.0, 0.0, 1.0]
    end: [0.8, 0.6, 1.0]
  - task_name: basic_training_show
    task_type: trajectory
    shape: basic_training_show
    training_task_kind: basic_training_show
    task_is_distribution: false
    task_is_show: true
    show_name: basic_training_show
    difficulty_level: basic
    duration_sec: 15.9
    sample_rate_hz: 10.0
    start_hold_enabled: true
    start_hold_sec: 1.0
    exclude_start_hold_from_tracking_metrics: true
    final_hold_enabled: true
    final_hold_sec: 1.0
    exclude_final_hold_from_tracking_metrics: true
    segment_count: 9
    meaningful_figure_count: 8
    segment_shapes: [start_hold, hover_stabilization, vertical, horizontal_line, diagonal_line, ellipse, l_shape, zigzag, final_hold]
    show_is_continuous: true
    continuity_tolerance: 0.000001
    sampled_per_episode: false
    constant_within_episode: true
    variation_enabled: false
    variation_mode: fixed
    duration_range_sec: [15.9, 15.9]
    move_duration_range_sec: [13.9, 13.9]
    segment_duration_range_sec: [1.0, 3.0]
    path_length_range_m: [2.475, 2.475]
    approx_reference_speed_range_mps: [0.143, 0.212]
    segment_speed_bounds:
      min_mps: 0.143
      max_mps: 0.212
    own_task_eval_path: evaluations/own_task
    generalization_eval_path: evaluations/generalization
    scenario_eval_path: evaluations/scenarios
    requested_task_family: basic_training_show
    accepted_task_family: basic_training_show
    variation_strength: 0.0
    proposed_sampling_bounds: {}
    accepted_sampling_bounds: {}
    repair_was_applied: false
    repair_reason: null
    segments:
      - segment_name: hover_start
        segment_shape: hover_stabilization
        segment_start: [0.0, 0.0, 0.9]
        segment_end: [0.0, 0.0, 0.9]
        segment_duration_sec: 1.0
      - segment_name: vertical_lift
        segment_shape: vertical
        segment_start: [0.0, 0.0, 0.9]
        segment_end: [0.0, 0.0, 1.1]
        segment_duration_sec: 1.4
      - segment_name: horizontal_line
        segment_shape: horizontal_line
        segment_start: [0.0, 0.0, 1.1]
        segment_end: [0.32, 0.0, 1.1]
        segment_duration_sec: 1.6
      - segment_name: diagonal_line
        segment_shape: diagonal_line
        segment_start: [0.32, 0.0, 1.1]
        segment_end: [0.54, 0.15, 1.12]
        segment_duration_sec: 1.7
      - segment_name: ellipse_loop
        segment_shape: ellipse
        segment_start: [0.54, 0.15, 1.12]
        segment_end: [0.54, 0.15, 1.12]
        segment_duration_sec: 3.0
        radius_x_m: 0.12
        radius_y_m: 0.08
        phase_deg: 180.0
      - segment_name: polyline_l_shape
        segment_shape: l_shape
        segment_start: [0.54, 0.15, 1.12]
        segment_end: [0.77, 0.36, 1.08]
        segment_duration_sec: 2.2
        segment_points:
          - [0.54, 0.15, 1.12]
          - [0.54, 0.36, 1.12]
          - [0.77, 0.36, 1.08]
      - segment_name: zigzag_finish
        segment_shape: zigzag
        segment_start: [0.77, 0.36, 1.08]
        segment_end: [1.18, 0.42, 1.04]
        segment_duration_sec: 3.0
        segment_points:
          - [0.77, 0.36, 1.08]
          - [0.91, 0.46, 1.08]
          - [1.05, 0.28, 1.04]
          - [1.18, 0.42, 1.04]
      - segment_name: final_hold
        segment_shape: final_hold
        segment_start: [1.18, 0.42, 1.04]
        segment_end: [1.18, 0.42, 1.04]
        segment_duration_sec: 1.0
        segment_final_hold_sec: 1.0
