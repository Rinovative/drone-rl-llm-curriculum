name: standard_scenario_reference_catalog
config_role: scenario_reference_catalog
notes: Primitive defaults and validation limits used only by standard scenario/show evaluation composition.
seed: 0
validation_limits:
  arena_xy_limit: 2.0
  min_height: 0.2
  max_height: 2.0
  max_speed_m_s: 2.0
  max_acceleration_m_s2: 5.0
  min_duration_sec: 1.0
  max_step_distance_m: 0.5
tasks:
