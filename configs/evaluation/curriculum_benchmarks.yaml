name: curriculum_benchmarks
benchmarks:
  - benchmark_name: line_basic
    task_shape: line
    eval_steps: 120
    task:
      task_type: trajectory
      shape: line
      duration_sec: 3.0
      sample_rate_hz: 10.0
      start_hold_enabled: true
      start_hold_sec: 1.0
      exclude_start_hold_from_tracking_metrics: true
      start: [0.0, 0.0, 1.0]
      end: [1.0, 0.0, 1.0]
  - benchmark_name: polyline_basic
    task_shape: polyline
    eval_steps: 120
    task:
      task_type: trajectory
      shape: polyline
      duration_sec: 6.0
      sample_rate_hz: 10.0
      start_hold_enabled: true
      start_hold_sec: 1.0
      exclude_start_hold_from_tracking_metrics: true
      points:
        - [0.0, 0.0, 1.0]
        - [0.4, 0.0, 1.0]
        - [0.4, 0.35, 1.0]
  - benchmark_name: circle_basic
    task_shape: circle
    eval_steps: 120
    task:
      task_type: trajectory
      shape: circle
      duration_sec: 8.0
      sample_rate_hz: 10.0
      start_hold_enabled: true
      start_hold_sec: 1.0
      exclude_start_hold_from_tracking_metrics: true
      radius: 0.5
      height: 1.0
      center: [0.0, 0.0]
      clockwise: false
  - benchmark_name: line_long
    task_shape: line
    eval_steps: 160
    task:
      task_type: trajectory
      shape: line
      duration_sec: 5.0
      sample_rate_hz: 10.0
      start_hold_enabled: true
      start_hold_sec: 1.0
      exclude_start_hold_from_tracking_metrics: true
      start: [0.0, 0.0, 1.0]
      end: [1.5, 0.0, 1.0]
