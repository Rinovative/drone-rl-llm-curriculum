evaluation_name: line_eval
seed: 0
eval_steps: 240

render:
  enabled: true
  fps: 20
  max_steps: null

plots:
  enabled: true

traces:
  enabled: true

tasks:
  - task_name: line_basic
    task_shape: line
    task:
      task_type: trajectory
      shape: line
      duration_sec: 3.0
      sample_rate_hz: 10.0
      start_hold_enabled: true
      start_hold_sec: 1.0
      exclude_start_hold_from_tracking_metrics: true
      start: [0.0, 0.0, 1.0]
      end: [1.0, 0.0, 1.0]
