scenario_name: show_medium
task_config_path: configs/evaluation/scenario_task_catalog.yaml
controller: scripted_reference
max_steps: 420
seed: 0
initial_state:
  mode: reference_start_random_offset
  xy_offset_range_m:
  - 0.1
  - 0.3
  z_offset_range_m:
  - -0.18
  - 0.08
  z_offset_bias: below
  below_probability: 0.7
start_hold_sec: 1.0
final_hold_sec: 1.2
camera:
  mode: follow_external
  distance: 1.2
  yaw: 42
  pitch: -24
phases:
- name: line_entry
  type: line
  duration_sec: 3.8
  start_mode: initial
  delta_position:
  - 0.52
  - 0.0
  - 0.0
- name: diagonal_cross
  type: line
  duration_sec: 3.2
  start_mode: previous_end
  delta_position:
  - 0.34
  - 0.28
  - 0.0
- name: vertical_rise
  type: vertical
  duration_sec: 2.7
  start_mode: previous_end
  start_height: 1.0
  end_height: 1.49
- name: medium_ellipse
  type: ellipse
  duration_sec: 6.2
  start_mode: previous_end
  radius_x_m: 0.3
  radius_y_m: 0.18
  start_angle_deg: 180.0
  revolutions: 1.0
- name: slalom_polyline
  type: polyline
  duration_sec: 5.8
  start_mode: previous_end
  waypoints:
  - - 0.0
    - 0.0
    - 0.0
  - - 0.23
    - 0.2
    - 0.0
  - - 0.46
    - -0.12
    - 0.0
  - - 0.68
    - 0.14
    - 0.0
- name: small_circle
  type: circle
  duration_sec: 6.2
  start_mode: previous_end
  radius_m: 0.2
  start_angle_deg: 180.0
  revolutions: 1.0
- name: altitude_line_exit
  type: line
  duration_sec: 3.8
  start_mode: previous_end
  delta_position:
  - 0.38
  - 0.16
  - -0.12
- name: final_polyline_settle
  type: polyline
  duration_sec: 4.2
  start_mode: previous_end
  waypoints:
  - - 0.0
    - 0.0
    - 0.0
  - - -0.22
    - -0.16
    - 0.0
  - - -0.42
    - -0.16
    - 0.08
start_height_policy: standard_reference_1p0m
base_z_m: 1.0
start_hold_policy: uniform_reference_start_hold_1p0s
start_hold_reward_policy: full_tracking_reward_active_during_uniform_reference_start_hold
tracking_reward_starts_after_start_hold: false
exclude_start_hold_from_tracking_metrics: true
standard_reference_height_enabled: true
