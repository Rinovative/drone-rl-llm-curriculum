scenario_name: show_easy
task_config_path: configs/evaluation/scenario_task_catalog.yaml
controller: scripted_reference
max_steps: 280
seed: 0
initial_state:
  mode: reference_start_random_offset
  xy_offset_range_m:
  - 0.1
  - 0.3
  z_offset_range_m:
  - -0.18
  - 0.08
  z_offset_bias: below
  below_probability: 0.7
start_hold_sec: 1.0
final_hold_sec: 1.0
camera:
  mode: follow_external
  distance: 1.15
  yaw: 35
  pitch: -22
phases:
- name: hover_start
  type: hover
  duration_sec: 1.5
  start_mode: initial
  hold_current_position: true
- name: horizontal_exit
  type: line
  duration_sec: 2.8
  start_mode: previous_end
  delta_position:
  - 0.45
  - 0.0
  - 0.0
- name: diagonal_drift
  type: line
  duration_sec: 2.8
  start_mode: previous_end
  delta_position:
  - 0.32
  - 0.24
  - 0.0
- name: vertical_settle
  type: vertical
  duration_sec: 2.2
  start_mode: previous_end
  start_height: 1.0
  end_height: 1.45
- name: gentle_ellipse
  type: ellipse
  duration_sec: 5.5
  start_mode: previous_end
  radius_x_m: 0.21
  radius_y_m: 0.13
  start_angle_deg: 180.0
  revolutions: 1.0
- name: easy_l_shape
  type: polyline
  duration_sec: 4.5
  start_mode: previous_end
  waypoints:
  - - 0.0
    - 0.0
    - 0.0
  - - 0.32
    - 0.0
    - 0.0
  - - 0.32
    - 0.32
    - 0.0
start_height_policy: standard_reference_1p0m
base_z_m: 1.0
start_hold_policy: uniform_reference_start_hold_1p0s
start_hold_reward_policy: full_tracking_reward_active_during_uniform_reference_start_hold
tracking_reward_starts_after_start_hold: false
exclude_start_hold_from_tracking_metrics: true
standard_reference_height_enabled: true
