scenario_name: show_easy
task_config_path: configs/evaluation/scenario_task_catalog.yaml
controller: scripted_reference
max_steps: 280
seed: 0
start_hold_sec: 2.5
final_hold_sec: 1.0
camera:
  mode: follow_external
  distance: 1.15
  yaw: 35
  pitch: -22
phases:
- name: hover_start
  type: hover
  duration_sec: 1.5
  start_mode: initial
  hold_current_position: true
- name: horizontal_exit
  type: line
  duration_sec: 2.8
  start_mode: previous_end
  delta_position:
  - 0.45
  - 0.0
  - 0.0
- name: diagonal_drift
  type: line
  duration_sec: 2.8
  start_mode: previous_end
  delta_position:
  - 0.32
  - 0.24
  - 0.0
- name: vertical_settle
  type: vertical
  duration_sec: 2.2
  start_mode: previous_end
  start_height: 0.8
  end_height: 1.25
- name: gentle_ellipse
  type: ellipse
  duration_sec: 5.5
  start_mode: previous_end
  radius_x_m: 0.21
  radius_y_m: 0.13
  start_angle_deg: 180.0
  revolutions: 1.0
- name: easy_l_shape
  type: polyline
  duration_sec: 4.5
  start_mode: previous_end
  waypoints:
  - - 0.0
    - 0.0
    - 0.0
  - - 0.32
    - 0.0
    - 0.0
  - - 0.32
    - 0.32
    - 0.0
lower_start_height_enabled: true
start_height_policy: adjusted_lower_reference_0p70_0p95m
base_z_m: 0.8
start_hold_policy: show_2p5s_after_adjusted_lower_reference
start_hold_reward_policy: full_tracking_reward_active_during_short_lower_start_hold
tracking_reward_starts_after_start_hold: false
