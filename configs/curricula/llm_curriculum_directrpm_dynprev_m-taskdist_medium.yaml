curriculum_name: llm_curriculum_directrpm_dynprev_m-taskdist_medium
base_training_config: configs/training/ppo_tracking_directrpm_dynprev_m-taskdist_medium.yaml
seed: 0
wandb_mode: auto
normalize_actions: true
max_stages: 10
reference_medium_config_path: configs/training/ppo_tracking_directrpm_dynprev_m-taskdist_medium.yaml
reference_medium_timesteps: 500000
stage_budget_multipliers:
  bootstrap: 1.0
  short: 0.35
  normal: 0.5
  recovery: 0.65
  extend: 0.8
stage_defaults:
  total_timesteps: 500000
  eval_steps: 240
llm_stage_budget:
  enabled: true
  total_budget_cap_timesteps: 2500000
  default_profile: normal
  min_stage_timesteps: 175000
  max_stage_timesteps: 500000
  profiles:
    bootstrap:
      total_timesteps: 500000
    short:
      total_timesteps: 175000
    normal:
      total_timesteps: 250000
    recovery:
      total_timesteps: 325000
    extend:
      total_timesteps: 400000
proposal_fallback:
  enabled: true
  task_distribution_id: tracking_medium
  default_stage_budget_profile: short
  ready_stage_budget_profile: normal
bootstrap:
  enabled: true
  stage_name: hover_stabilization
  task_shape: hover_stabilization
  stage_budget_profile: bootstrap
  budget_rationale: Deterministic randomized hover-target bootstrap uses 1.0x the reference medium budget before LLM adaptation.
  total_timesteps: 500000
  eval_steps: 240
  notes: Fixed Stage 1 bootstrap samples a constant hover target per episode from bounded x/y/z ranges; LLM proposals begin
    at Stage 2.
  bootstrap_stage_source: deterministic_config
  bootstrap_task_shape: hover_stabilization
  bootstrap_target_sampling_bounds:
    x:
    - -0.5
    - 0.5
    y:
    - -0.5
    - 0.5
    z:
    - 0.9
    - 1.1
  task_distribution_id: bootstrap_randomized_hover_target
  task_distribution_config_path: configs/tasks/task_distribution_hover_bootstrap_medium.yaml
  task:
    task_type: trajectory
    shape: hover_stabilization
    duration_sec: 3.0
    sample_rate_hz: 10.0
    start_hold_enabled: true
    start_hold_sec: 2.0
    exclude_start_hold_from_tracking_metrics: true
    position:
    - 0.0
    - 0.0
    - 1.0
    start_height_policy: standard_reference_1p0m
    height_variation_enabled: true
    start_hold_policy: uniform_2p0s_start_hold
    start_hold_reward_policy: full_tracking_reward_active_during_uniform_start_hold
    tracking_reward_starts_after_start_hold: false
    base_z_m: 1.0
    sampled_start_height_m: 1.0
    standard_reference_height_enabled: true
llm:
  provider: openai_compatible
  api_base: http://127.0.0.1:18080/v1
  model: qwen2.5-coder-32b-instruct-q4_k_m.gguf
  api_key_env: LLAMA_CPP_API_KEY
  api_key: anything
  temperature: 0.1
  max_tokens: 900
  timeout_sec: 60.0
  max_repair_attempts: 1
  skip_invalid_proposals: false
  recent_context_limit: 3
