curriculum_name: curriculum_llm_pid_dynprev_m-taskdist_medium
base_training_config: configs/training/ppo_tracking_pid_dynprev_m-taskdist_medium.yaml
seed: 0
wandb_mode: auto
normalize_actions: true
max_stages: 10
reference_medium_config_path: configs/training/ppo_tracking_pid_dynprev_m-taskdist_medium.yaml
reference_medium_timesteps: 500000
stage_budget_multipliers:
  bootstrap: 1.5
  short: 0.75
  normal: 1.0
  recovery: 1.25
  extend: 1.5
stage_defaults:
  total_timesteps: 500000
  eval_steps: 240
llm_stage_budget:
  enabled: true
  total_budget_cap_timesteps: 5500000
  default_profile: normal
  min_stage_timesteps: 375000
  max_stage_timesteps: 750000
  profiles:
    bootstrap:
      total_timesteps: 750000
    short:
      total_timesteps: 375000
    normal:
      total_timesteps: 500000
    recovery:
      total_timesteps: 625000
    extend:
      total_timesteps: 750000
proposal_fallback:
  enabled: true
  task_distribution_id: tracking_medium
  default_stage_budget_profile: short
  ready_stage_budget_profile: normal

bootstrap:
  enabled: true
  stage_name: line
  task_shape: line
  stage_budget_profile: bootstrap
  budget_rationale: Deterministic bootstrap uses 1.5x the reference medium budget before LLM adaptation.
  total_timesteps: 750000
  eval_steps: 240
  notes: Bootstrap with a deterministic line while the base training config enables medium task-distribution sampling.
  task:
    task_type: trajectory
    shape: line
    duration_sec: 4.0
    sample_rate_hz: 10.0
    start_hold_enabled: true
    start_hold_sec: 1.0
    exclude_start_hold_from_tracking_metrics: true
    start: [0.0, 0.0, 1.0]
    end: [0.6, 0.0, 1.0]
llm:
  provider: openai_compatible
  api_base: http://127.0.0.1:18080/v1
  model: qwen2.5-coder-32b-instruct-q4_k_m.gguf
  api_key_env: LLAMA_CPP_API_KEY
  api_key: anything
  temperature: 0.1
  max_tokens: 900
  timeout_sec: 60.0
  max_repair_attempts: 1
  skip_invalid_proposals: false
  recent_context_limit: 3
