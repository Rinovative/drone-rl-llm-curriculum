curriculum_name: curriculum_llm_smoke
base_training_config: configs/training/ppo_tracking_smoke.yaml
seed: 0
wandb_mode: disabled
normalize_actions: true
max_stages: 3
stage_defaults:
  total_timesteps: 4096
  eval_steps: 120
bootstrap:
  enabled: true
  stage_name: hover_stabilization
  task_shape: hover_stabilization
  total_timesteps: 4096
  eval_steps: 120
  notes: Bootstrap with a deterministic hover task before asking the LLM for harder proposals.
  task:
    task_type: trajectory
    shape: hover_stabilization
    duration_sec: 2.0
    sample_rate_hz: 10.0
    position: [0.0, 0.0, 1.0]
llm:
  provider: mock
  model: deterministic-mock
  max_repair_attempts: 1
  skip_invalid_proposals: false
  recent_context_limit: 3
  mock_responses:
    - >-
      {"task_type":"trajectory","shape":"start_hold_then_short_line","hold_duration_sec":1.0,"move_duration_sec":3.0,"sample_rate_hz":10.0,"start_hold_enabled":true,"start_hold_sec":1.0,"exclude_start_hold_from_tracking_metrics":true,"start":[0.0,0.0,1.0],"end":[0.25,0.0,1.0],"reason":"Move from hover to a short line while keeping a start hold for stable takeoff."}
    - >-
      {"task_type":"trajectory","shape":"short_slow_line","duration_sec":4.0,"sample_rate_hz":10.0,"start_hold_enabled":true,"start_hold_sec":1.0,"exclude_start_hold_from_tracking_metrics":true,"start":[0.0,0.0,1.0],"end":[0.5,0.0,1.0],"reason":"Extend the previous line distance while keeping speed modest and validation-friendly."}
