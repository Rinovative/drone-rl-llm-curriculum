curriculum_name: curriculum_manual_pid_dynprev_m-taskdist_medium
base_training_config: configs/training/ppo_tracking_pid_dynprev_m-taskdist_medium.yaml
seed: 0
wandb_mode: auto
normalize_actions: true
reference_medium_config_path: configs/training/ppo_tracking_pid_dynprev_m-taskdist_medium.yaml
reference_medium_timesteps: 500000
stage_budget_multiplier: 1.0
stage_total_timesteps: 500000
manual_total_budget_timesteps: 2500000
manual_stage_count: 5
stages:
- stage_name: hover_stabilization
  task_shape: hover_stabilization
  total_timesteps: 500000
  eval_steps: 240
  notes: Sample bounded hover targets before varied tracking.
  stage_task_distribution_config_path: configs/tasks/task_distribution_hover_bootstrap_medium.yaml
  training_task_distribution_config_path: configs/tasks/task_distribution_hover_bootstrap_medium.yaml
  sampled_task_family: hover_stabilization
  sampled_task_shape: hover_stabilization
  bootstrap_stage_source: deterministic_config
  bootstrap_task_shape: hover_stabilization
  bootstrap_target_sampling_bounds:
    x:
    - -0.5
    - 0.5
    y:
    - -0.5
    - 0.5
    z:
    - 0.9
    - 1.1
  stage_sampling_bounds:
    target_position:
      x:
      - -0.5
      - 0.5
      y:
      - -0.5
      - 0.5
      z:
      - 0.9
      - 1.1
  task:
    task_type: trajectory
    shape: hover_stabilization
    duration_sec: 3.0
    sample_rate_hz: 10.0
    start_hold_enabled: true
    start_hold_sec: 2.0
    exclude_start_hold_from_tracking_metrics: true
    position:
    - 0.0
    - 0.0
    - 1.0
    start_height_policy: standard_reference_1p0m
    height_variation_enabled: true
    start_hold_policy: uniform_2p0s_start_hold
    start_hold_reward_policy: full_tracking_reward_active_during_uniform_start_hold
    tracking_reward_starts_after_start_hold: false
    base_z_m: 1.0
    sampled_start_height_m: 1.0
    standard_reference_height_enabled: true
  evaluation_task:
    task_type: trajectory
    shape: hover_stabilization
    duration_sec: 3.0
    sample_rate_hz: 10.0
    start_hold_enabled: true
    start_hold_sec: 2.0
    exclude_start_hold_from_tracking_metrics: true
    position:
    - 0.0
    - 0.0
    - 1.0
    start_height_policy: standard_reference_1p0m
    height_variation_enabled: true
    start_hold_policy: uniform_2p0s_start_hold
    start_hold_reward_policy: full_tracking_reward_active_during_uniform_start_hold
    tracking_reward_starts_after_start_hold: false
    base_z_m: 1.0
    sampled_start_height_m: 1.0
    standard_reference_height_enabled: true
- stage_name: vertical_low_high
  task_shape: vertical
  total_timesteps: 500000
  eval_steps: 240
  notes: Sample low-to-high altitude corrections in a small XY neighborhood.
  stage_task_distribution_config_path: configs/tasks/task_distribution_vertical_bootstrap_medium.yaml
  training_task_distribution_config_path: configs/tasks/task_distribution_vertical_bootstrap_medium.yaml
  sampled_task_family: takeoff_stabilization
  sampled_task_shape: vertical
  stage_sampling_bounds:
    xy_radius_m: 0.2
    x:
    - -0.2
    - 0.2
    y:
    - -0.2
    - 0.2
    start_height:
    - 0.9
    - 1.1
    end_height:
    - 1.0
    - 1.35
    duration_sec:
    - 4.0
    - 5.8
    start_hold_sec:
    - 2.0
    - 2.0
  task:
    task_type: trajectory
    shape: vertical
    duration_sec: 4.2
    sample_rate_hz: 10.0
    start_hold_enabled: true
    start_hold_sec: 2.0
    exclude_start_hold_from_tracking_metrics: true
    xy:
    - 0.1
    - 0.0
    start_height: 1.0
    end_height: 1.35
    start_height_policy: standard_reference_1p0m
    height_variation_enabled: true
    start_hold_policy: uniform_2p0s_start_hold
    start_hold_reward_policy: full_tracking_reward_active_during_uniform_start_hold
    tracking_reward_starts_after_start_hold: false
    base_z_m: 1.0
    sampled_start_height_m: 1.0
    standard_reference_height_enabled: true
  evaluation_task:
    task_type: trajectory
    shape: vertical
    duration_sec: 4.2
    sample_rate_hz: 10.0
    start_hold_enabled: true
    start_hold_sec: 2.0
    exclude_start_hold_from_tracking_metrics: true
    xy:
    - 0.1
    - 0.0
    start_height: 1.0
    end_height: 1.35
    start_height_policy: standard_reference_1p0m
    height_variation_enabled: true
    start_hold_policy: uniform_2p0s_start_hold
    start_hold_reward_policy: full_tracking_reward_active_during_uniform_start_hold
    tracking_reward_starts_after_start_hold: false
    base_z_m: 1.0
    sampled_start_height_m: 1.0
    standard_reference_height_enabled: true
- stage_name: start_hold_then_short_line
  task_shape: start_hold_then_short_line
  total_timesteps: 500000
  eval_steps: 240
  notes: Sample a start hold followed by a short bounded horizontal move.
  stage_task_distribution_config_path: configs/tasks/task_distribution_short_line_bootstrap_medium.yaml
  training_task_distribution_config_path: configs/tasks/task_distribution_short_line_bootstrap_medium.yaml
  sampled_task_family: start_hold_then_line
  sampled_task_shape: start_hold_then_short_line
  stage_sampling_bounds:
    start_xy_radius_m: 0.15
    start_x:
    - -0.15
    - 0.15
    start_y:
    - -0.15
    - 0.15
    z:
    - 0.9
    - 1.1
    line_length_m:
    - 0.3
    - 0.7
    direction_angle_deg:
    - -45.0
    - 45.0
    hold_duration_sec:
    - 2.0
    - 2.0
    move_duration_sec:
    - 3.5
    - 5.5
  task:
    task_type: trajectory
    shape: start_hold_then_short_line
    hold_duration_sec: 2.0
    move_duration_sec: 4.0
    sample_rate_hz: 10.0
    start_hold_enabled: true
    start_hold_sec: 2.0
    exclude_start_hold_from_tracking_metrics: true
    start:
    - 0.0
    - 0.0
    - 1.0
    end:
    - 0.45
    - 0.0
    - 1.0
    start_height_policy: standard_reference_1p0m
    height_variation_enabled: true
    start_hold_policy: uniform_2p0s_start_hold
    start_hold_reward_policy: full_tracking_reward_active_during_uniform_start_hold
    tracking_reward_starts_after_start_hold: false
    base_z_m: 1.0
    sampled_start_height_m: 1.0
    standard_reference_height_enabled: true
  evaluation_task:
    task_type: trajectory
    shape: start_hold_then_short_line
    hold_duration_sec: 2.0
    move_duration_sec: 4.0
    sample_rate_hz: 10.0
    start_hold_enabled: true
    start_hold_sec: 2.0
    exclude_start_hold_from_tracking_metrics: true
    start:
    - 0.0
    - 0.0
    - 1.0
    end:
    - 0.45
    - 0.0
    - 1.0
    start_height_policy: standard_reference_1p0m
    height_variation_enabled: true
    start_hold_policy: uniform_2p0s_start_hold
    start_hold_reward_policy: full_tracking_reward_active_during_uniform_start_hold
    tracking_reward_starts_after_start_hold: false
    base_z_m: 1.0
    sampled_start_height_m: 1.0
    standard_reference_height_enabled: true
- stage_name: polyline_l_shape
  task_shape: polyline
  total_timesteps: 500000
  eval_steps: 240
  notes: Sample gentle L-shape polylines before broader randomized tracking.
  stage_task_distribution_config_path: configs/tasks/task_distribution_polyline_bootstrap_medium.yaml
  training_task_distribution_config_path: configs/tasks/task_distribution_polyline_bootstrap_medium.yaml
  sampled_task_family: l_shape
  sampled_task_shape: polyline
  stage_sampling_bounds:
    start_xy_radius_m: 0.15
    heading_jitter_deg: 30.0
    first_segment_length_m:
    - 0.38
    - 0.75
    second_segment_length_m:
    - 0.32
    - 0.62
    z:
    - 0.9
    - 1.1
    final_height_offset_m:
    - -0.1
    - 0.1
    turn_direction:
    - left
    - right
    duration_sec:
    - 7.5
    - 9.5
    start_hold_sec:
    - 2.0
    - 2.0
  task:
    task_type: trajectory
    shape: polyline
    duration_sec: 8.0
    sample_rate_hz: 10.0
    start_hold_enabled: true
    start_hold_sec: 2.0
    exclude_start_hold_from_tracking_metrics: true
    points:
    - - 0.0
      - 0.0
      - 1.0
    - - 0.55
      - 0.0
      - 1.0
    - - 0.55
      - 0.45
      - 1.05
    start_height_policy: standard_reference_1p0m
    height_variation_enabled: true
    start_hold_policy: uniform_2p0s_start_hold
    start_hold_reward_policy: full_tracking_reward_active_during_uniform_start_hold
    tracking_reward_starts_after_start_hold: false
    base_z_m: 1.0
    sampled_start_height_m: 1.0
    standard_reference_height_enabled: true
  evaluation_task:
    task_type: trajectory
    shape: polyline
    duration_sec: 8.0
    sample_rate_hz: 10.0
    start_hold_enabled: true
    start_hold_sec: 2.0
    exclude_start_hold_from_tracking_metrics: true
    points:
    - - 0.0
      - 0.0
      - 1.0
    - - 0.55
      - 0.0
      - 1.0
    - - 0.55
      - 0.45
      - 1.05
    start_height_policy: standard_reference_1p0m
    height_variation_enabled: true
    start_hold_policy: uniform_2p0s_start_hold
    start_hold_reward_policy: full_tracking_reward_active_during_uniform_start_hold
    tracking_reward_starts_after_start_hold: false
    base_z_m: 1.0
    sampled_start_height_m: 1.0
    standard_reference_height_enabled: true
- stage_name: medium_tracking
  task_shape: line
  total_timesteps: 500000
  eval_steps: 240
  notes: Sample the full medium tracking task distribution while evaluating a representative line.
  stage_task_distribution_config_path: configs/tasks/task_distribution_tracking_medium.yaml
  training_task_distribution_config_path: configs/tasks/task_distribution_tracking_medium.yaml
  sampled_task_family: tracking_medium
  sampled_task_shape: mixed
  stage_sampling_bounds:
    source_config_path: configs/tasks/task_distribution_tracking_medium.yaml
    strength: 0.45
    base_task_shape: line
    family_weights:
      hover_stabilization: 0.2
      takeoff_stabilization: 0.1
      line: 0.35
      start_hold_then_line: 0.15
      polyline: 0.08
      l_shape: 0.07
      rectangle: 0.04
      square: 0.03
      circle: 0.05
      ellipse: 0.03
      figure_eight: 0.02
  task:
    task_type: trajectory
    shape: line
    duration_sec: 4.5
    sample_rate_hz: 10.0
    start_hold_enabled: true
    start_hold_sec: 2.0
    exclude_start_hold_from_tracking_metrics: true
    start:
    - 0.0
    - 0.0
    - 1.0
    end:
    - 0.75
    - 0.0
    - 1.0
    start_height_policy: standard_reference_1p0m
    height_variation_enabled: true
    start_hold_policy: uniform_2p0s_start_hold
    start_hold_reward_policy: full_tracking_reward_active_during_uniform_start_hold
    tracking_reward_starts_after_start_hold: false
    base_z_m: 1.0
    sampled_start_height_m: 1.0
    standard_reference_height_enabled: true
  evaluation_task:
    task_type: trajectory
    shape: line
    duration_sec: 4.5
    sample_rate_hz: 10.0
    start_hold_enabled: true
    start_hold_sec: 2.0
    exclude_start_hold_from_tracking_metrics: true
    start:
    - 0.0
    - 0.0
    - 1.0
    end:
    - 0.75
    - 0.0
    - 1.0
    start_height_policy: standard_reference_1p0m
    height_variation_enabled: true
    start_hold_policy: uniform_2p0s_start_hold
    start_hold_reward_policy: full_tracking_reward_active_during_uniform_start_hold
    tracking_reward_starts_after_start_hold: false
    base_z_m: 1.0
    sampled_start_height_m: 1.0
    standard_reference_height_enabled: true
