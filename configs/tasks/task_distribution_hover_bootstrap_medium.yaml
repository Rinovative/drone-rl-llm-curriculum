name: bootstrap_randomized_hover_target
task_config_role: training_distribution
task_is_distribution: true
sampled_per_episode: true
constant_within_episode: true
variation_enabled: true
task_distribution:
  name: bootstrap_randomized_hover_target
  enabled: true
  mode: randomized
  seed: 0
  strength: 1.0
  sample_on_reset: true
  base_task:
    task_type: trajectory
    shape: hover_stabilization
    duration_sec: 3.0
    sample_rate_hz: 10.0
    start_hold_enabled: true
    start_hold_sec: 1.2
    exclude_start_hold_from_tracking_metrics: true
    position:
    - 0.0
    - 0.0
    - 0.55
    lower_start_height_enabled: true
    start_height_policy: lower_active_reference_0p45_0p75m
    height_variation_enabled: true
    start_hold_policy: training_1p2s_after_lower_reference
    start_hold_reward_policy: full_tracking_reward_active_during_short_lower_start_hold
    tracking_reward_starts_after_start_hold: false
    base_z_m: 0.55
    sampled_start_height_m: 0.55
  family_weights:
    hover_stabilization: 1.0
  variations:
    hover_stabilization:
      x_range_m:
      - -0.5
      - 0.5
      y_range_m:
      - -0.5
      - 0.5
      z_range_m:
      - 0.45
      - 0.75
      base_z_range_m:
      - 0.45
      - 0.75
  metadata:
    lower_start_height_enabled: true
    start_height_policy: lower_active_reference_0p45_0p75m
    base_z_range_m:
    - 0.45
    - 0.75
    base_z_offset_range_m:
    - -0.55
    - -0.25
    height_variation_enabled: true
    start_hold_policy: training_1p2s_after_lower_reference
    start_hold_reward_policy: full_tracking_reward_active_during_short_lower_start_hold
    tracking_reward_starts_after_start_hold: false
lower_start_height_enabled: true
start_height_policy: lower_active_reference_0p45_0p75m
base_z_range_m:
- 0.45
- 0.75
base_z_offset_range_m:
- -0.55
- -0.25
height_variation_enabled: true
start_hold_policy: training_1p2s_after_lower_reference
start_hold_reward_policy: full_tracking_reward_active_during_short_lower_start_hold
tracking_reward_starts_after_start_hold: false
