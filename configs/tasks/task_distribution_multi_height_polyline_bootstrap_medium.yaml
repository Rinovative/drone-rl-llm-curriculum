name: multi_height_polyline_bootstrap
task_config_role: training_distribution
task_is_distribution: true
sampled_per_episode: true
constant_within_episode: true
variation_enabled: true
notes: Bounded altitude-changing polyline bootstrap distribution for LLM curriculum stages.
validation_limits:
  arena_xy_limit: 2.0
  min_height: 0.2
  max_height: 2.0
  max_speed_m_s: 2.0
  max_acceleration_m_s2: 5.0
  min_duration_sec: 1.0
  max_step_distance_m: 0.5
task_distribution:
  enabled: true
  mode: randomized
  seed: 0
  strength: 0.45
  sample_on_reset: true
  base_task:
    task_type: trajectory
    shape: line
    duration_sec: 4.0
    sample_rate_hz: 10.0
    start_hold_enabled: true
    start_hold_sec: 1.2
    exclude_start_hold_from_tracking_metrics: true
    final_hold_enabled: true
    final_hold_sec: 1.0
    exclude_final_hold_from_tracking_metrics: true
    start:
    - 0.0
    - 0.0
    - 0.8
    end:
    - 0.65
    - 0.0
    - 0.8
    lower_start_height_enabled: true
    start_height_policy: adjusted_lower_reference_0p70_0p95m
    height_variation_enabled: true
    start_hold_policy: training_1p2s_after_adjusted_lower_reference
    start_hold_reward_policy: full_tracking_reward_active_during_short_lower_start_hold
    tracking_reward_starts_after_start_hold: false
    base_z_m: 0.8
    sampled_start_height_m: 0.8
  family_weights:
    multi_height_polyline: 1.0
  variations:
    multi_height_polyline:
      start_xy_radius_m: 0.1
      heading_jitter_deg: 25
      length_range_m:
      - 0.45
      - 0.95
      height_offset_range_m:
      - -0.14
      - 0.16
      z_range_m:
      - 0.65
      - 1.3
      duration_range_sec:
      - 7.5
      - 11.5
      start_hold_range_sec:
      - 1.2
      - 1.2
      final_hold_range_sec:
      - 0.75
      - 1.1
      base_z_range_m:
      - 0.7
      - 0.95
  metadata:
    lower_start_height_enabled: true
    start_height_policy: adjusted_lower_reference_0p70_0p95m
    base_z_range_m:
    - 0.7
    - 0.95
    base_z_offset_range_m:
    - -0.3
    - -0.05
    height_variation_enabled: true
    start_hold_policy: training_1p2s_after_adjusted_lower_reference
    start_hold_reward_policy: full_tracking_reward_active_during_short_lower_start_hold
    tracking_reward_starts_after_start_hold: false
lower_start_height_enabled: true
start_height_policy: adjusted_lower_reference_0p70_0p95m
base_z_range_m:
- 0.7
- 0.95
base_z_offset_range_m:
- -0.3
- -0.05
height_variation_enabled: true
start_hold_policy: training_1p2s_after_adjusted_lower_reference
start_hold_reward_policy: full_tracking_reward_active_during_short_lower_start_hold
tracking_reward_starts_after_start_hold: false
