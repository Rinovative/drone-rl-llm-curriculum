name: angled_vertical_bootstrap
task_config_role: training_distribution
task_is_distribution: true
sampled_per_episode: true
constant_within_episode: true
variation_enabled: true
start_height_policy: standard_reference_1p0m
base_z_range_m:
- 0.9
- 1.1
height_variation_enabled: true
start_hold_policy: uniform_reference_start_hold_1p0s
start_hold_reward_policy: full_tracking_reward_active_during_uniform_reference_start_hold
tracking_reward_starts_after_start_hold: false
validation_limits:
  arena_xy_limit: 2.0
  min_height: 0.2
  max_height: 2.0
  max_speed_m_s: 2.0
  max_acceleration_m_s2: 5.0
  min_duration_sec: 1.0
  max_step_distance_m: 0.5
notes: Focused standard-height angled climb/descent distribution with side motion plus z change.
task_distribution:
  name: angled_vertical_bootstrap
  enabled: true
  mode: randomized
  seed: 0
  strength: 0.45
  sample_on_reset: true
  base_task:
    task_type: trajectory
    shape: line
    duration_sec: 5.8
    sample_rate_hz: 10.0
    start:
    - 0.0
    - 0.0
    - 1.0
    end:
    - 0.32
    - 0.22
    - 0.98
    start_hold_enabled: true
    start_hold_sec: 1.0
    exclude_start_hold_from_tracking_metrics: true
    final_hold_enabled: true
    final_hold_sec: 1.0
    exclude_final_hold_from_tracking_metrics: true
    start_height_policy: standard_reference_1p0m
    base_z_m: 1.0
    base_z_range_m:
    - 0.9
    - 1.1
    sampled_start_height_m: 1.0
    height_variation_enabled: true
    start_hold_policy: uniform_reference_start_hold_1p0s
    start_hold_reward_policy: full_tracking_reward_active_during_uniform_reference_start_hold
    tracking_reward_starts_after_start_hold: false
    standard_reference_height_enabled: true
  family_weights:
    angled_vertical: 1.0
  variations:
    angled_vertical:
      start_xy_radius_m: 0.12
      start_z_range_m:
      - 0.9
      - 1.1
      z_range_m:
      - 0.75
      - 1.35
      height_delta_range_m:
      - 0.16
      - 0.34
      lateral_range_m:
      - 0.22
      - 0.48
      direction: up_down
      heading_choices_deg:
      - 35.0
      - 145.0
      - -35.0
      - -145.0
      heading_jitter_deg: 8.0
      duration_range_sec:
      - 4.8
      - 7.8
      start_hold_range_sec:
      - 1.0
      - 1.0
      final_hold_range_sec:
      - 0.75
      - 1.1
      base_z_range_m:
      - 0.9
      - 1.1
  metadata:
    start_height_policy: standard_reference_1p0m
    base_z_range_m:
    - 0.9
    - 1.1
    height_variation_enabled: true
    start_hold_policy: uniform_reference_start_hold_1p0s
    start_hold_reward_policy: full_tracking_reward_active_during_uniform_reference_start_hold
    tracking_reward_starts_after_start_hold: false
    standard_reference_height_enabled: true
standard_reference_height_enabled: true
