name: vertical_bootstrap_medium
task_config_role: training_distribution
task_is_distribution: true
sampled_per_episode: true
constant_within_episode: true
variation_enabled: true
validation_limits:
  arena_xy_limit: 2.0
  min_height: 0.2
  max_height: 2.0
  max_speed_m_s: 2.0
  max_acceleration_m_s2: 5.0
  min_duration_sec: 1.0
  max_step_distance_m: 0.5
task_distribution:
  name: vertical_bootstrap_medium
  enabled: true
  mode: randomized
  seed: 0
  strength: 1.0
  sample_on_reset: true
  base_task:
    task_type: trajectory
    shape: vertical
    duration_sec: 4.0
    sample_rate_hz: 10.0
    start_hold_enabled: true
    start_hold_sec: 1.0
    exclude_start_hold_from_tracking_metrics: true
    xy:
    - 0.0
    - 0.0
    start_height: 0.75
    end_height: 1.25
  family_weights:
    takeoff_stabilization: 1.0
  variations:
    takeoff_stabilization:
      xy_radius_m: 0.2
      start_z_range_m:
      - 0.65
      - 0.9
      z_range_m:
      - 1.1
      - 1.4
      duration_range_sec:
      - 3.5
      - 5.0
      start_hold_range_sec:
      - 1.0
      - 1.0
