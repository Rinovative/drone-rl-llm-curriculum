name: tracking_broad
notes: Experimental broad distribution; use only after small and medium distributions are stable.
validation_limits:
  arena_xy_limit: 2.0
  min_height: 0.2
  max_height: 2.0
  max_speed_m_s: 2.0
  max_acceleration_m_s2: 5.0
  min_duration_sec: 1.0
  max_step_distance_m: 0.5
task_distribution:
  enabled: true
  mode: randomized
  seed: 0
  strength: 0.60
  sample_on_reset: true
  base_task:
    task_type: trajectory
    shape: line
    duration_sec: 5.0
    sample_rate_hz: 10.0
    start_hold_enabled: true
    start_hold_sec: 1.0
    exclude_start_hold_from_tracking_metrics: true
    start: [0.0, 0.0, 1.0]
    end: [0.8, 0.0, 1.0]
  family_weights:
    hover_stabilization: 0.15
    takeoff_stabilization: 0.10
    line: 0.25
    start_hold_then_line: 0.15
    polyline: 0.10
    l_shape: 0.08
    rectangle: 0.06
    square: 0.05
    circle: 0.06
    ellipse: 0.04
    figure_eight: 0.03
  variations:
    hover_stabilization:
      xy_radius_m: 0.30
      z_range_m: [0.75, 1.35]
      duration_range_sec: [2.5, 6.0]
    takeoff_stabilization:
      xy_radius_m: 0.20
      start_z_range_m: [0.3, 0.6]
      z_range_m: [0.75, 1.4]
      duration_range_sec: [3.5, 6.0]
      start_hold_range_sec: [0.5, 1.5]
    line:
      start_xy_radius_m: 0.22
      heading_jitter_deg: 45
      length_range_m: [0.35, 1.0]
      z_range_m: [0.8, 1.3]
      duration_range_sec: [5.0, 9.0]
      start_hold_range_sec: [0.5, 2.0]
    start_hold_then_line:
      start_xy_radius_m: 0.20
      heading_jitter_deg: 45
      length_range_m: [0.30, 0.95]
      z_range_m: [0.8, 1.3]
      hold_duration_range_sec: [0.75, 2.25]
      move_duration_range_sec: [4.5, 8.5]
    polyline:
      start_xy_radius_m: 0.20
      heading_jitter_deg: 40
      length_range_m: [0.35, 0.9]
      z_range_m: [0.85, 1.25]
      duration_range_sec: [7.0, 11.0]
      start_hold_range_sec: [0.75, 2.0]
    l_shape:
      start_xy_radius_m: 0.18
      heading_jitter_deg: 35
      leg1_range_m: [0.30, 0.65]
      leg2_range_m: [0.25, 0.55]
      z_range_m: [0.85, 1.25]
      duration_range_sec: [8.0, 12.0]
      start_hold_range_sec: [0.75, 2.0]
    rectangle:
      center_xy_radius_m: 0.10
      width_range_m: [0.25, 0.45]
      height_range_m: [0.20, 0.40]
      z_range_m: [0.9, 1.2]
      duration_range_sec: [10.0, 14.0]
      start_hold_range_sec: [0.75, 2.0]
    square:
      center_xy_radius_m: 0.10
      width_range_m: [0.22, 0.40]
      z_range_m: [0.9, 1.2]
      duration_range_sec: [10.0, 14.0]
      start_hold_range_sec: [0.75, 2.0]
    circle:
      center_xy_radius_m: 0.10
      radius_range_m: [0.20, 0.45]
      z_range_m: [0.9, 1.25]
      duration_range_sec: [9.0, 13.0]
      start_hold_range_sec: [0.75, 2.0]
    ellipse:
      center_xy_radius_m: 0.10
      radius_x_range_m: [0.22, 0.45]
      radius_y_range_m: [0.12, 0.32]
      z_range_m: [0.9, 1.25]
      duration_range_sec: [10.0, 14.0]
      start_hold_range_sec: [0.75, 2.0]
    figure_eight:
      center_xy_radius_m: 0.10
      radius_x_range_m: [0.18, 0.38]
      radius_y_range_m: [0.10, 0.26]
      z_range_m: [0.9, 1.25]
      duration_range_sec: [11.0, 16.0]
      start_hold_range_sec: [0.75, 2.0]
