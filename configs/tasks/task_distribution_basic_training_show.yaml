name: basic_training_show
notes: Bounded per-episode variation around the foundational composed Direct-PPO training show.
validation_limits:
  arena_xy_limit: 2.0
  min_height: 0.2
  max_height: 2.0
  max_speed_m_s: 2.0
  max_acceleration_m_s2: 5.0
  min_duration_sec: 1.0
  max_step_distance_m: 0.5
task_distribution:
  enabled: true
  mode: randomized
  seed: 0
  strength: 0.65
  sample_on_reset: true
  base_task:
    task_type: trajectory
    shape: basic_training_show
    duration_sec: 18.2
    sample_rate_hz: 10.0
    final_hold_enabled: true
    final_hold_sec: 1.1
    exclude_final_hold_from_tracking_metrics: true
    segments:
      - segment_name: hover_start
        segment_shape: hover_stabilization
        segment_start: [0.0, 0.0, 0.9]
        segment_end: [0.0, 0.0, 0.9]
        segment_duration_sec: 1.2
      - segment_name: vertical_lift
        segment_shape: vertical
        segment_start: [0.0, 0.0, 0.9]
        segment_end: [0.0, 0.0, 1.2]
        segment_duration_sec: 1.8
      - segment_name: horizontal_line
        segment_shape: horizontal_line
        segment_start: [0.0, 0.0, 1.2]
        segment_end: [0.45, 0.0, 1.2]
        segment_duration_sec: 2.2
      - segment_name: diagonal_line
        segment_shape: diagonal_line
        segment_start: [0.45, 0.0, 1.2]
        segment_end: [0.75, 0.22, 1.2]
        segment_duration_sec: 2.2
      - segment_name: ellipse_loop
        segment_shape: ellipse
        segment_start: [0.75, 0.22, 1.2]
        segment_end: [0.75, 0.22, 1.2]
        segment_duration_sec: 3.5
        radius_x_m: 0.14
        radius_y_m: 0.09
        phase_deg: 180.0
      - segment_name: polyline_l_shape
        segment_shape: l_shape
        segment_start: [0.75, 0.22, 1.2]
        segment_end: [1.07, 0.5, 1.15]
        segment_duration_sec: 3.0
        segment_points:
          - [0.75, 0.22, 1.2]
          - [0.75, 0.5, 1.2]
          - [1.07, 0.5, 1.15]
      - segment_name: zigzag_finish
        segment_shape: zigzag
        segment_start: [1.07, 0.5, 1.15]
        segment_end: [1.61, 0.58, 1.10]
        segment_duration_sec: 3.2
        segment_points:
          - [1.07, 0.5, 1.15]
          - [1.25, 0.62, 1.15]
          - [1.43, 0.38, 1.10]
          - [1.61, 0.58, 1.10]
      - segment_name: final_hold
        segment_shape: final_hold
        segment_start: [1.61, 0.58, 1.10]
        segment_end: [1.61, 0.58, 1.10]
        segment_duration_sec: 1.1
        segment_final_hold_sec: 1.1
  family_weights:
    basic_training_show: 1.0
  variations:
    basic_training_show:
      x_offset_range_m: [-0.12, 0.12]
      y_offset_range_m: [-0.12, 0.12]
      z_offset_range_m: [-0.05, 0.08]
      length_scale_range: [0.90, 1.10]
      duration_scale_range: [0.92, 1.10]
      heading_jitter_deg: 18.0
      ellipse_scale_range: [0.85, 1.15]
      final_hold_range_sec: [0.9, 1.3]
