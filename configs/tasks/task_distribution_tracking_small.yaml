name: tracking_small
validation_limits:
  arena_xy_limit: 2.0
  min_height: 0.2
  max_height: 2.0
  max_speed_m_s: 2.0
  max_acceleration_m_s2: 5.0
  min_duration_sec: 1.0
  max_step_distance_m: 0.5
task_distribution:
  enabled: true
  mode: randomized
  seed: 0
  strength: 0.25
  sample_on_reset: true
  base_task:
    task_type: trajectory
    shape: hover_stabilization
    position: [0.0, 0.0, 1.0]
    duration_sec: 3.0
    sample_rate_hz: 10.0
  family_weights:
    hover_stabilization: 0.35
    takeoff_stabilization: 0.15
    line: 0.35
    start_hold_then_line: 0.15
  variations:
    hover_stabilization:
      xy_radius_m: 0.18
      z_range_m: [0.85, 1.15]
      duration_range_sec: [2.0, 5.0]
    takeoff_stabilization:
      xy_radius_m: 0.10
      start_z_range_m: [0.3, 0.5]
      z_range_m: [0.8, 1.2]
      duration_range_sec: [3.0, 5.0]
      start_hold_range_sec: [0.5, 1.2]
    line:
      start_xy_radius_m: 0.12
      heading_jitter_deg: 25
      length_range_m: [0.25, 0.70]
      z_range_m: [0.85, 1.15]
      duration_range_sec: [4.0, 7.0]
      start_hold_range_sec: [0.5, 1.5]
    start_hold_then_line:
      start_xy_radius_m: 0.10
      heading_jitter_deg: 25
      length_range_m: [0.20, 0.60]
      z_range_m: [0.85, 1.15]
      hold_duration_range_sec: [0.75, 1.75]
      move_duration_range_sec: [3.5, 6.5]
