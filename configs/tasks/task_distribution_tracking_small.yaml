name: tracking_small
task_config_role: training_distribution
task_is_distribution: true
sampled_per_episode: true
constant_within_episode: true
variation_enabled: true
validation_limits:
  arena_xy_limit: 2.0
  min_height: 0.2
  max_height: 2.0
  max_speed_m_s: 2.0
  max_acceleration_m_s2: 5.0
  min_duration_sec: 1.0
  max_step_distance_m: 0.5
task_distribution:
  enabled: true
  mode: randomized
  seed: 0
  strength: 0.25
  sample_on_reset: true
  base_task:
    task_type: trajectory
    shape: hover_stabilization
    position:
    - 0.0
    - 0.0
    - 0.8
    duration_sec: 3.0
    sample_rate_hz: 10.0
    start_hold_enabled: true
    start_hold_sec: 1.2
    exclude_start_hold_from_tracking_metrics: true
    lower_start_height_enabled: true
    start_height_policy: adjusted_lower_reference_0p70_0p95m
    height_variation_enabled: true
    start_hold_policy: training_1p2s_after_adjusted_lower_reference
    start_hold_reward_policy: full_tracking_reward_active_during_short_lower_start_hold
    tracking_reward_starts_after_start_hold: false
    base_z_m: 0.8
    sampled_start_height_m: 0.8
  family_weights:
    hover_stabilization: 0.35
    takeoff_stabilization: 0.15
    line: 0.35
    start_hold_then_line: 0.15
  variations:
    hover_stabilization:
      xy_radius_m: 0.18
      z_range_m:
      - 0.7
      - 0.95
      duration_range_sec:
      - 2.0
      - 5.0
      base_z_range_m:
      - 0.7
      - 0.95
    takeoff_stabilization:
      xy_radius_m: 0.1
      start_z_range_m:
      - 0.7
      - 0.9
      z_range_m:
      - 0.9
      - 1.3
      duration_range_sec:
      - 3.0
      - 5.0
      start_hold_range_sec:
      - 1.2
      - 1.2
      base_z_range_m:
      - 0.7
      - 0.95
    line:
      start_xy_radius_m: 0.12
      heading_jitter_deg: 25
      length_range_m:
      - 0.3
      - 0.82
      z_range_m:
      - 0.7
      - 0.95
      duration_range_sec:
      - 4.5
      - 8.0
      start_hold_range_sec:
      - 1.2
      - 1.2
      base_z_range_m:
      - 0.7
      - 0.95
    start_hold_then_line:
      start_xy_radius_m: 0.1
      heading_jitter_deg: 25
      length_range_m:
      - 0.25
      - 0.72
      z_range_m:
      - 0.7
      - 0.95
      hold_duration_range_sec:
      - 1.2
      - 1.2
      move_duration_range_sec:
      - 4.0
      - 7.5
      base_z_range_m:
      - 0.7
      - 0.95
  metadata:
    lower_start_height_enabled: true
    start_height_policy: adjusted_lower_reference_0p70_0p95m
    base_z_range_m:
    - 0.7
    - 0.95
    base_z_offset_range_m:
    - -0.3
    - -0.05
    height_variation_enabled: true
    start_hold_policy: training_1p2s_after_adjusted_lower_reference
    start_hold_reward_policy: full_tracking_reward_active_during_short_lower_start_hold
    tracking_reward_starts_after_start_hold: false
lower_start_height_enabled: true
start_height_policy: adjusted_lower_reference_0p70_0p95m
base_z_range_m:
- 0.7
- 0.95
base_z_offset_range_m:
- -0.3
- -0.05
height_variation_enabled: true
start_hold_policy: training_1p2s_after_adjusted_lower_reference
start_hold_reward_policy: full_tracking_reward_active_during_short_lower_start_hold
tracking_reward_starts_after_start_hold: false
