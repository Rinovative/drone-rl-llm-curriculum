name: Quality Report

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python
        run: uv python install 3.10

      - name: Ruff report
        run: |
          uvx ruff check . || true
          uvx ruff format --check . --exclude "*.ipynb" || true

      - name: Mypy report
        run: |
          uvx mypy src || true

      - name: Complexity report
        run: |
          uvx --from radon radon cc -j src > /tmp/radon_complexity.json || true

          python - << 'PY'
          import json
          from pathlib import Path


          def format_complexity(value: float) -> str:
              """Format integer values without decimals and other values with two decimals."""
              value = float(value)
              return str(int(value)) if value.is_integer() else f"{value:.2f}"


          def complexity_grade(complexity: float) -> str:
              """Return the Radon-style complexity grade for a numeric complexity value."""
              if complexity <= 5:
                  return "A"
              if complexity <= 10:
                  return "B"
              if complexity <= 20:
                  return "C"
              if complexity <= 30:
                  return "D"
              if complexity <= 40:
                  return "E"
              return "F"


          path = Path("/tmp/radon_complexity.json")
          if not path.exists() or not path.read_text(encoding="utf-8").strip():
              print("No complexity output produced by radon.")
              raise SystemExit(0)

          data = json.loads(path.read_text(encoding="utf-8"))

          all_blocks = [block for file in data for block in data[file]]
          total_files = sum(1 for file in data if data[file])

          average_complexity = (
              sum(block["complexity"] for block in all_blocks) / len(all_blocks)
              if all_blocks
              else 0.0
          )
          global_grade = complexity_grade(average_complexity)

          grade_sort_order = {"F": 0, "E": 1, "D": 2, "C": 3, "B": 4, "A": 5}

          file_rows: list[tuple[str, str, float, list[dict]]] = []
          for file, blocks in data.items():
              if not blocks:
                  continue

              worst_block = max(blocks, key=lambda block: block["complexity"])
              file_rows.append((file, worst_block["rank"], worst_block["complexity"], blocks))

          file_rows.sort(
              key=lambda row: (
                  grade_sort_order.get(row[1], 999),
                  -float(row[2]),
              )
          )

          print("=================== COMPLEXITY SUMMARY ===================")
          print(f"Total files analysed: {total_files}")
          print(f"Global complexity:     {global_grade} ({average_complexity:.2f})")
          print("==========================================================")
          print()

          print("=================== COMPLEXITY PER FILE ===================")
          print("Grade  CC          File")
          print("==============================================================")

          previous_rank: str | None = None
          for file, rank, complexity, _blocks in file_rows:
              if previous_rank is not None and rank != previous_rank:
                  print("-------------------------------------------------------------------------------")
              print(f"{rank:<6} {format_complexity(complexity):<10} {file}")
              previous_rank = rank

          print("==============================================================")
          print()

          print("=================== FUNCTION BREAKDOWN ===================")
          print("Item                                         Grade(CC)")
          print("============================================================")

          for file, _rank, _complexity, blocks in file_rows:
              print("------------------------------------------------------------")
              print(file)

              sorted_blocks = sorted(
                  blocks,
                  key=lambda block: (
                      grade_sort_order.get(block["rank"], 999),
                      -float(block["complexity"]),
                  ),
              )

              for block in sorted_blocks:
                  complexity_text = format_complexity(block["complexity"])
                  print(f"  {block['name']:<40} {block['rank']}({complexity_text})")

          print("============================================================")
          PY